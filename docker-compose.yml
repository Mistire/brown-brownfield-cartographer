version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/ui/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CARTOGRAPHY_DIR=/app/.cartography
      - PYTHONPATH=/app/src
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - .:/app
      - ./.cartography:/app/.cartography
      - .env:/app/.env
    env_file:
      - .env
    restart: always

  dashboard:
    build:
      context: src/ui/dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: always

volumes:
  cartography_data:
